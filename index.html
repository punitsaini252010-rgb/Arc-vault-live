        .tilt-card {
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease;

            text-shadow: 0 10px 20px rgba(0,0,0,0.8);

        .fly-in.active { opacity: 1; transform: translateY(0) scale(1); }
        
        /* KINETIC CLICK SHOCKWAVE */
        .click-ripple {
            position: fixed;
            border-radius: 50%;
            border: 2px solid var(--cyan);
            box-shadow: 0 0 30px var(--cyan), inset 0 0 20px var(--cyan);
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            animation: ripple 0.7s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
            z-index: 99999;
        }
        @keyframes ripple {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; border-width: 4px; }
            100% { transform: translate(-50%, -50%) scale(4); opacity: 0; border-width: 0px; }
        }

        .nav-item.active { background: rgba(212,175,55,0.15); border-left: 3px solid var(--gold); color: var(--gold); }
        .nav-item:hover:not(.active) { background: rgba(255,255,255,0.05); transform: translateX(5px); }
        
        .locked-item { opacity: 0.4; cursor: not-allowed; border-left: 3px solid transparent; background: rgba(255,0,0,0.05); }
        .locked-item:hover { opacity: 0.6; background: rgba(255,0,0,0.1); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }

            <p class="text-lg md:text-xl leading-loose mb-8 text-gray-300">You cannot survive hunting big whales if you can't pay your fucking rent. You need a baseline. You need a shield.</p>
            
            <p class="text-lg md:text-xl leading-loose mb-8 text-gray-300">You package your knowledge into a high-value PDF document. You price it at $47 or $49. You put it on Gumroad. This weeds out the broke, useless freebie-seekers! Keep the buyers.</p>
            
            <div class="bg-black/60 p-8 border-l-4 border-yellow-500 mt-10 shadow-[0_0_20px_rgba(255,215,0,0.1)]">
                <h4 class="text-yellow-400 font-black text-xl mb-4 tracking-widest uppercase">🏦 BANKING PROTOCOL (CRITICAL)</h4>
                <p class="font-mono text-base leading-relaxed text-gray-300">When setting up your Gumroad payout, operational security is everything. If you use a family member's ID to bypass live verification, the banking details MUST match the ID exactly. If the official document has a specific spelling for the name, do not mistype it in the bank portal. Secure the payload, extract the capital, and stay off the radar.</p>
            </div>
        </div>
    </template>

    <script>
        // KINETIC CLICK EFFECT
        document.addEventListener('click', function(e) {
            let ripple = document.createElement('div');
            ripple.className = 'click-ripple';
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 700);
        });

        // THE VAULT DATABASE (4 Active, 21 Locked)
        const arcModels = [
            {
                title: "MODEL 01: ARC NATURAL (AFFILIATE)",
                locked: false,
                parts: [
                    { id: "m1-p1", title: "PART 1: THE VISION 👁️" },
                    { id: "m1-p2", title: "PART 2: THE SETUP ⚙️" },
                    { id: "m1-p3", title: "PART 3: THE MANIPULATION 🎭" }
                ]
            },
            {
                title: "MODEL 02: AI TRAINING AGENCY",
                locked: false,
                parts: [
                    { id: "m2-p1", title: "PART 1: THE BLEEDING NECK 🩸" },
                    { id: "m2-p2", title: "PART 2: THE SETUP 💻" },
                    { id: "m2-p3", title: "PART 3: THE MANIPULATION 🕷️" }
                ]
            },
            {
                title: "MODEL 03: SAAS TOLL BOOTH",
                locked: false,
                parts: [
                    { id: "m3-p1", title: "PART 1: HIGH-TICKET BROKERAGE 🛑" },
                    { id: "m3-p2", title: "PART 2: THE SETUP ⚔️" },
                    { id: "m3-p3", title: "PART 3: THE MANIPULATION 🍪" }
                ]
            },
            {
                title: "MODEL 04: THE DIGITAL SHIELD",
                locked: false,
                parts: [
                    { id: "m4-p1", title: "PART 1: THE $47 WALL 🛡️" }
                ]
            }
        ];

        // GENERATE LOCKED MODELS (To show massive scale)
        const lockedNames = [
            "GHOST COMMERCE", "YOUTUBE ARBITRAGE", "ONLYFANS MANAGEMENT", 
            "NEWSLETTER ACQUISITION", "INFO-PRODUCT INCUBATOR", "TIKTOK SHOP PRINTING",
            "X/TWITTER GHOSTWRITING", "DISCORD COMMUNITY MONETIZATION", "SOFTWARE WHITE-LABELING", 
            "OFFSHORE STAFFING ARBITRAGE", "LOCAL SEO HIJACKING", "INSTAGRAM THEME PAGES", 
            "UGC CONTENT AGENCY", "HIGH-TICKET APPOINTMENT SETTING", "PINTEREST E-COM", 
            "LINKEDIN B2B GROWTH", "PODCAST CLIPPING AGENCY", "TELEGRAM SIGNAL GROUPS",
            "THE DELTA PROTOCOL", "RAPID SCALING VELOCITY", "THE ESCAPE ROUTE"
        ];
        
        lockedNames.forEach((name, index) => {
            let num = index + 5;
            arcModels.push({
                title: "MODEL " + (num < 10 ? "0" + num : num) + ": " + name,
                locked: true,
                parts: []
            });
        });

        let activeId = "m1-p1";
        let isAudioPlaying = false;
        
        // Solid, stable audio link
        const audioSrc = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"; 

        const audioEl = document.getElementById('arc-audio');
        const audioBtn = document.getElementById('audio-btn');
        const sidebar = document.getElementById('sidebar');
        const navContainer = document.getElementById('nav-container');
        const contentArea = document.getElementById('lesson-content');
        const scrollCanvas = document.getElementById('scroll-canvas');
        const menuBtn = document.getElementById('mobile-menu-btn');

        // AUDIO SETUP
        audioEl.src = audioSrc;
        audioEl.volume = 0.5;

        // EVENT LISTENERS
        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
        });

        audioBtn.addEventListener('click', () => {
            if(isAudioPlaying) {
                audioEl.pause();
                audioBtn.innerHTML = '🔊 INITIALIZE AUDIO';
                audioBtn.classList.remove('bg-[#D4AF37]', 'text-black');
            } else {
                let playPromise = audioEl.play();
                if (playPromise !== undefined) {
                    playPromise.then(_ => {
                        audioBtn.innerHTML = '⏸ DICTATION ACTIVE';
                        audioBtn.classList.add('bg-[#D4AF37]', 'text-black');
                    }).catch(error => {
                        console.log("Autoplay prevented by browser.", error);
                    });
                }
            }
            isAudioPlaying = !isAudioPlaying;
        });

        function buildNav() {
            navContainer.innerHTML = '';
            
            arcModels.forEach(mod => {
                const section = document.createElement('div');
                section.className = 'mb-8';
                
                const header = document.createElement('div');
                header.className = 'text-[11px] text-[#D4AF37] font-black mb-4 tracking-[0.1em] uppercase flex justify-between items-center';
                header.innerText = mod.title;
                
                if(mod.locked) {
                    const lock = document.createElement('span');
                    lock.className = 'text-red-500 text-sm';
                    lock.innerText = '🔒';
                    header.appendChild(lock);
                }
                section.appendChild(header);

                const ul = document.createElement('ul');
                ul.className = 'space-y-3 pl-3 border-l border-[#AA771C]/30';
                
                if(!mod.locked) {
                    mod.parts.forEach(p => {
                        const li = document.createElement('li');
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'nav-item px-4 py-2 text-xs font-black tracking-wider text-gray-300 ' + (p.id === activeId ? 'active' : '');
                        itemDiv.innerText = p.title;
                        
                        itemDiv.addEventListener('click', () => { loadContent(p.id); });
                        
                        li.appendChild(itemDiv);
                        ul.appendChild(li);
                    });
                } else {
                    const li = document.createElement('li');
                    li.innerHTML = '<div class="locked-item px-4 py-2 text-[10px] font-black text-red-500 tracking-[0.2em] uppercase">NOT ELIGIBLE TO UNLOCK</div>';
                    ul.appendChild(li);
                }
                
                section.appendChild(ul);
                navContainer.appendChild(section);
            });
        }

        function loadContent(id) {
            activeId = id;
            buildNav(); 
            
            const template = document.getElementById(id);
            if(template) {
                contentArea.innerHTML = template.innerHTML;
            } else {
                contentArea.innerHTML = '<h1 class="text-red-500 font-black text-4xl">SYSTEM ERROR 404</h1><p class="text-gray-400 mt-4">Module data corrupted or missing.</p>';
            }
            
            scrollCanvas.scrollTop = 0;
            
            // Close mobile sidebar
            if(window.innerWidth < 768) {
                sidebar.classList.add('-translate-x-full');
            }

            // Trigger 3D Fly-In Animations
            setTimeout(() => {
                document.querySelectorAll('.fly-in').forEach(el => el.classList.add('active'));
            }, 50);
        }

        // INITIALIZE
        window.addEventListener('DOMContentLoaded', () => {
            buildNav();
            loadContent('m1-p1');
        });
    </script>
</body>
</html>
