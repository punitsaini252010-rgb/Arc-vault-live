                 <script>
        // CYAN THUNDERSTRIKE CLICK
        document.addEventListener('click', function(e) {
            if(e.target.tagName.toLowerCase() === 'button') return; 
            let thunder = document.createElement('div');
            thunder.className = 'thunder-strike';
            thunder.style.left = e.clientX + 'px';
            thunder.style.top = e.clientY + 'px';
            document.body.appendChild(thunder);
            setTimeout(() => thunder.remove(), 400);
        });

        // VAULT ARCHITECTURE
        const vaultStructure = [
            {
                tier: "TIER 1: INSTANT LIQUIDITY",
                models: [
                    { id: "arc-aff", title: "ARC AFFILIATE", locked: false, parts: [ { id: "m1-p1", name: "PART 1: KNOWLEDGE" }, { id: "m1-p2", name: "PART 2: SETUP" }, { id: "m1-p3", name: "PART 3: MANIPULATION" } ] },
                    { id: "ai-train", title: "AI TRAINING AGENCY", locked: false, parts: [ { id: "m2-p1", name: "PART 1: KNOWLEDGE" }, { id: "m2-p2", name: "PART 2: SETUP" }, { id: "m2-p3", name: "PART 3: MANIPULATION" } ] },
                    { id: "crypto-fut", title: "CRYPTO FUTURES", locked: false, parts: [ { id: "m3-p1", name: "PART 1: KNOWLEDGE" }, { id: "m3-p2", name: "PART 2: SETUP" }, { id: "m3-p3", name: "PART 3: MANIPULATION" } ] },
                    { id: "ghost-ag", title: "GHOST AGENCY", locked: true, parts: [] },
                    { id: "onlyfans", title: "ONLYFANS MANAGEMENT", locked: true, parts: [] }
                ]
            },
            {
                tier: "TIER 2: COMPOUNDING MACHINES",
                models: [
                    { id: "saas-toll", title: "SAAS TOLL BOOTH", locked: true, parts: [] },
                    { id: "yt-arb", title: "YOUTUBE ARBITRAGE", locked: true, parts: [] },
                    { id: "news-acq", title: "NEWSLETTER ACQUISITION", locked: true, parts: [] },
                    { id: "info-incub", title: "INFO-PRODUCT INCUBATOR", locked: true, parts: [] },
                    { id: "tiktok-shop", title: "TIKTOK SHOP PRINTING", locked: true, parts: [] }
                ]
            },
            {
                tier: "TIER 3: THE EMPIRE",
                models: [
                    { id: "soft-own", title: "SOFTWARE OWNERSHIP", locked: true, parts: [] },
                    { id: "offshore", title: "OFFSHORE HOLDINGS", locked: true, parts: [] },
                    { id: "private-eq", title: "PRIVATE EQUITY", locked: true, parts: [] },
                    { id: "real-estate", title: "REAL ESTATE HOLDINGS", locked: true, parts: [] },
                    { id: "delta-protocol", title: "THE DELTA PROTOCOL", locked: true, parts: [] }
                ]
            }
        ];

        let activeId = "m1-p1";
        
        // NEURAL TEXT TO SPEECH ENGINE
        const synth = window.speechSynthesis;
        const audioBtn = document.getElementById('audio-btn');

        audioBtn.addEventListener('click', () => {
            if (synth.speaking) {
                synth.cancel();
                audioBtn.innerHTML = '🔊 INITIALIZE DICTATION';
                audioBtn.classList.remove('bg-[#D4AF37]', 'text-black');
            } else {
                const contentArea = document.getElementById('lesson-content');
                const paragraphs = contentArea.querySelectorAll('p, h1, h2, h3');
                let textToRead = "";
                paragraphs.forEach(p => textToRead += p.innerText + ". ");
                
                if(!textToRead) return;
                
                const utterance = new SpeechSynthesisUtterance(textToRead);
                utterance.rate = 0.9; 
                
                utterance.onend = () => {
                    audioBtn.innerHTML = '🔊 INITIALIZE DICTATION';
                    audioBtn.classList.remove('bg-[#D4AF37]', 'text-black');
                };

                synth.speak(utterance);
                audioBtn.innerHTML = '⏸ STOP DICTATION';
                audioBtn.classList.add('bg-[#D4AF37]', 'text-black');
            }
        });

        function buildNav() {
            const nav = document.getElementById('nav-container');
            nav.innerHTML = '';
            
            vaultStructure.forEach(tierBlock => {
                const tierDiv = document.createElement('div');
                tierDiv.className = 'mb-10';
                tierDiv.innerHTML = `<h3 class="text-[10px] text-gray-500 font-black mb-4 tracking-[0.3em] border-b border-gray-800 pb-2">${tierBlock.tier}</h3>`;
                
                tierBlock.models.forEach(mod => {
                    const modDiv = document.createElement('div');
                    modDiv.className = 'mb-4';
                    
                    let headerHtml = `<div class="text-xs text-[#D4AF37] font-bold mb-2 tracking-widest uppercase flex justify-between">${mod.title}`;
                    if(mod.locked) headerHtml += ' <span class="text-red-500 text-sm">🔒</span>';
                    headerHtml += `</div>`;
                    
                    let ulHtml = `<ul class="space-y-1 pl-2 border-l border-[#AA771C]/30">`;
                    
                    if(!mod.locked) {
                        mod.parts.forEach(p => {
                            const activeClass = p.id === activeId ? 'active' : '';
                            ulHtml += `<li><div onclick="loadContent('${p.id}')" class="nav-item px-4 py-2 text-[11px] font-black tracking-widest text-gray-300 ${activeClass}">${p.name}</div></li>`;
                        });
                    } else {
                        ulHtml += `<li><div class="locked-item px-4 py-2 text-[10px] font-black text-red-500 tracking-widest">NOT ELIGIBLE TO UNLOCK</div></li>`;
                    }
                    
                    ulHtml += `</ul>`;
                    modDiv.innerHTML = headerHtml + ulHtml;
                    tierDiv.appendChild(modDiv);
                });
                
                nav.appendChild(tierDiv);
            });
        }

        function loadContent(id) {
            activeId = id;
            buildNav(); 
            
            if(synth.speaking) {
                synth.cancel();
                audioBtn.innerHTML = '🔊 INITIALIZE DICTATION';
                audioBtn.classList.remove('bg-[#D4AF37]', 'text-black');
            }

            const template = document.getElementById(id);
            const contentArea = document.getElementById('lesson-content');
            
            if(template) {
                contentArea.innerHTML = template.innerHTML;
            } else {
                contentArea.innerHTML = '<h1 class="text-red-500 font-black text-4xl">SYSTEM ERROR</h1><p class="text-gray-400">Data array empty.</p>';
            }
            
            document.getElementById('scroll-canvas').scrollTop = 0;
            
            if(window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
            }

            setupScrollMagic();
        }

        function setupScrollMagic() {
            const elements = document.querySelectorAll('.fly-in');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

            elements.forEach(el => observer.observe(el));
            
            setTimeout(() => {
                elements.forEach((el, index) => {
                    if(index < 4) el.classList.add('active');
                });
            }, 100);
        }

        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        });

        window.addEventListener('DOMContentLoaded', () => {
            buildNav();
            loadContent('m1-p1');
        });
    </script>
