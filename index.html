<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC | THE VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Montserrat:wght@300;500;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at top right, #5C4033, #2c1e12);
            background-color: #2c1e12;
            color: #FFFFFF;
            font-family: 'Montserrat', sans-serif;
        }
        .old-money-heading {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #b38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            color: transparent;
        }
        .gold-border { border: 1px solid #AA771C; box-shadow: 0 0 10px rgba(191, 149, 63, 0.3); }
        
        .fly-in { opacity: 0; transform: translateY(20px); transition: all 0.6s ease; }
        .fly-in.active { opacity: 1; transform: translateY(0); }
        
        .nav-item { cursor: pointer; transition: all 0.3s; border-left: 3px solid transparent; }
        .nav-item.active { background: rgba(191,149,63,0.1); border-left: 3px solid #D4AF37; color: #D4AF37; }
        .nav-item:hover { background: rgba(255,255,255,0.05); }
        .locked { opacity: 0.5; cursor: not-allowed; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #AA771C; }
    </style>
</head>
<body class="flex h-screen w-screen">

    <button onclick="toggleSidebar()" class="md:hidden fixed top-4 left-4 z-50 gold-border bg-[#2c1e12] p-2 rounded">
        <span class="text-[#D4AF37] font-bold tracking-widest text-xs">MENU</span>
    </button>

    <div id="sidebar" class="w-72 h-full bg-[#1a120b] border-r border-[#AA771C]/30 flex-shrink-0 absolute md:relative z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
        <div class="p-8 border-b border-[#AA771C]/20">
            <h2 class="old-money-heading text-4xl">ARC</h2>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-2 font-bold">Instant Liquidity Matrix</p>
        </div>
        <div class="overflow-y-auto p-4 space-y-6" id="nav-container"></div>
    </div>

    <div class="flex-1 flex flex-col relative h-full">
        <div class="h-16 md:h-20 border-b border-[#AA771C]/20 bg-[#2c1e12]/90 flex items-center justify-between px-6 z-20">
            <span class="text-xs text-gray-400 uppercase tracking-widest hidden md:block">Status: <span class="text-green-500 font-bold">Live</span></span>
            <button onclick="toggleAudio()" id="audio-btn" class="gold-border px-4 py-2 text-[10px] font-bold uppercase tracking-widest text-[#D4AF37] hover:bg-[#D4AF37] hover:text-black transition-colors ml-auto">
                🔊 INITIALIZE AUDIO
            </button>
        </div>

        <div id="scroll-canvas" class="flex-1 overflow-y-auto p-6 md:p-16 pt-20 relative z-10">
            <div class="max-w-3xl mx-auto pb-32" id="lesson-content"></div>
        </div>
    </div>

    <audio id="arc-audio" src=""></audio>

    <template id="m1-p1">
        <h1 class="old-money-heading text-4xl md:text-5xl mb-8 fly-in">THE MIDDLEMAN SLAUGHTER</h1>
        <p class="text-lg leading-relaxed mb-6 fly-in text-gray-300">Listen to me. You want to get rich? You need instant liquidity. Not in ten years. Now.</p>
        <p class="text-lg leading-relaxed mb-6 fly-in text-gray-300">Inventing software takes millions of dollars and a team of nerds. We bypass that slaughter entirely. You do not build the road. You assemble the toll booth.</p>
        <div class="my-10 p-8 border border-[#FF003C] bg-red-900/10 rounded fly-in">
            <h3 class="text-[#FF003C] font-black text-lg mb-4 uppercase tracking-widest">⚠️ MANIPULATION TACTIC</h3>
            <p class="text-sm text-gray-300 font-mono leading-relaxed">Do not beg them to buy. Diagnose them. Tell an agency owner: "Your team loses $4,000 a month in manual data entry. This AI system replaces your assistant for $500 a month." He does not look at the cost. He looks at the $3,500 he just saved. Drop the link and walk away.</p>
        </div>
    </template>

    <template id="m1-p2">
        <h1 class="old-money-heading text-4xl md:text-5xl mb-8 fly-in">THE 60-DAY COOKIE TRAP</h1>
        <p class="text-lg leading-relaxed mb-6 fly-in text-gray-300">This is how you get paid while you sleep. High-ticket buyers do not impulse buy.</p>
        <p class="text-lg leading-relaxed mb-6 fly-in text-gray-300">When you give them your affiliate link, it drops a tracking cookie in their browser for 60 days! Even if they come back a month later, the code wires you the cash.</p>
        <div class="my-10 p-8 border border-[#00FFFF] bg-cyan-900/10 rounded fly-in">
            <h2 class="text-xl font-black text-[#00FFFF] mb-6 uppercase tracking-widest">⚙️ SETUP PROTOCOL</h2>
            <ul class="space-y-4 text-sm text-gray-300 font-mono">
                <li><span class="text-[#00FFFF] font-bold">1.</span> Go to PartnerStack.com or Impact.com.</li>
                <li><span class="text-[#00FFFF] font-bold">2.</span> Apply for B2B CRM programs offering 40%+ recurring commissions.</li>
                <li><span class="text-[#00FFFF] font-bold">3.</span> When asked how you promote, say: "I run a targeted B2B content funnel for agencies." You will be approved instantly.</li>
            </ul>
        </div>
    </template>

    <template id="m2-p1">
        <h1 class="old-money-heading text-4xl md:text-5xl mb-8 fly-in">THE BLEEDING NECK</h1>
        <p class="text-lg leading-relaxed mb-6 fly-in text-gray-300">Every single offline business on earth wants one thing: More paying clients.</p>
        <p class="text-lg leading-relaxed mb-6 fly-in text-gray-300">If you can bring a local roofing or solar business a list of people begging to buy, they will write you a blank check. You are a Ghost Agency.</p>
        <div class="my-10 p-8 border border-[#FFD700] bg-yellow-900/10 rounded fly-in">
            <h3 class="text-[#FFD700] font-black text-lg mb-4 uppercase tracking-widest">💡 BIG DREAM SCALING</h3>
            <p class="text-sm text-gray-300 font-mono leading-relaxed">Close one solar company. Send 10 leads a week at $100 each. That is $1,000 a week pure profit. Get five clients. Park that $5,000 a week in Delta Exchange and watch your capital compound.</p>
        </div>
    </template>

    <template id="m2-p2">
        <h1 class="old-money-heading text-4xl md:text-5xl mb-8 fly-in">SCRAPE & STRIKE</h1>
        <p class="text-lg leading-relaxed mb-6 fly-in text-gray-300">Scrape leads using Apollo.io. Find businesses spending money on Google Ads but running terrible websites.</p>
        <p class="text-lg leading-relaxed mb-6 fly-in text-gray-300">You do not sell marketing. You sell the END RESULT. Arbitrage the attention. Buy cheap clicks on Facebook, flip the lead for a 500% markup.</p>
        <div class="my-10 p-8 border border-[#D4AF37] bg-yellow-900/10 rounded fly-in">
            <h2 class="text-xl font-black text-[#D4AF37] mb-6 uppercase tracking-widest">✉️ LETHAL COLD EMAIL</h2>
            <p class="text-sm text-gray-300 italic mb-4">"Hey [Name], I have 5 homeowners in [City] looking to get solar installed this week. My usual partner is booked. Can you handle the volume? Reply YES and I will send you their numbers."</p>
            <p class="text-xs text-[#00FFFF] font-bold uppercase tracking-widest">Notice: They will reply. You are handing them free money.</p>
        </div>
    </template>

    <template id="m3-p1">
        <h1 class="old-money-heading text-4xl md:text-5xl mb-8 fly-in">THE $47 WALL</h1>
        <p class="text-lg leading-relaxed mb-6 fly-in text-gray-300">You cannot survive hunting whales if you cannot pay rent. You need a shield.</p>
        <p class="text-lg leading-relaxed mb-6 fly-in text-gray-300">Package your knowledge into a high-value PDF. Price it at $47. Put it on Gumroad. This weeds out the broke freebie-seekers.</p>
        <div class="my-10 p-8 border border-[#00FFFF] bg-cyan-900/10 rounded fly-in">
            <h3 class="text-[#00FFFF] font-black text-lg mb-4 uppercase tracking-widest">🏦 BANKING PROTOCOL</h3>
            <p class="text-sm text-gray-300 font-mono leading-relaxed">When setting up Gumroad, precision is everything. If you use a parent's ID to bypass verification, the bank details MUST match the ID exactly. It is Prameshwar not Parmeshwar in the account. Get the spelling right, get paid, and stay off the radar.</p>
        </div>
    </template>

    <script>
        const structure = [
            {
                title: "MODEL 01: SAAS TOLL BOOTH",
                locked: false,
                parts: [
                    { id: "m1-p1", title: "PART 1: THE SLAUGHTER", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
                    { id: "m1-p2", title: "PART 2: 60-DAY COOKIE", audio: "" }
                ]
            },
            {
                title: "MODEL 02: B2B ARBITRAGE",
                locked: false,
                parts: [
                    { id: "m2-p1", title: "PART 1: BLEEDING NECK", audio: "" },
                    { id: "m2-p2", title: "PART 2: SCRAPE & STRIKE", audio: "" }
                ]
            },
            {
                title: "MODEL 03: DIGITAL SHIELD",
                locked: false,
                parts: [
                    { id: "m3-p1", title: "PART 1: THE $47 WALL", audio: "" }
                ]
            },
            {
                title: "MODEL 04: ESCAPE ROUTE",
                locked: true,
                parts: []
            }
        ];

        let activeId = "m1-p1";
        let audioPlaying = false;
        const audioEl = document.getElementById('arc-audio');
        const audioBtn = document.getElementById('audio-btn');

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        function initNav() {
            const nav = document.getElementById('nav-container');
            nav.innerHTML = '';
            structure.forEach(mod => {
                let html = '<div class="mb-8"><div class="text-[10px] text-[#D4AF37] font-black mb-3 tracking-widest uppercase flex justify-between">' + mod.title;
                if(mod.locked) html += ' <span class="text-red-500">🔒</span>';
                html += '</div><ul class="space-y-1 pl-2 border-l border-[#AA771C]/30">';
                
                if(!mod.locked) {
                    mod.parts.forEach(p => {
                        const active = p.id === activeId ? 'active' : '';
                        html += '<li><div onclick="loadPart(\\''+p.id+'\\')" class="nav-item px-4 py-2 text-xs font-bold text-gray-300 ' + active + '">' + p.title + '</div></li>';
                    });
                } else {
                    html += '<li><div class="locked px-4 py-2 text-xs font-bold text-gray-500">AWAITING TRANSMISSION</div></li>';
                }
                nav.innerHTML += html + '</ul></div>';
            });
        }

        function loadPart(id) {
            activeId = id;
            initNav();
            
            const template = document.getElementById(id);
            const contentArea = document.getElementById('lesson-content');
            
            if(template) {
                contentArea.innerHTML = template.innerHTML;
            } else {
                contentArea.innerHTML = '<h1 class="text-red-500">SYSTEM ERROR: CONTENT NOT FOUND</h1>';
            }
            
            document.getElementById('scroll-canvas').scrollTop = 0;
            
            // Audio Reset
            let partData;
            structure.forEach(m => m.parts.forEach(p => { if(p.id === id) partData = p; }));
            audioEl.src = partData.audio || "";
            audioPlaying = false;
            audioEl.pause();
            audioBtn.innerHTML = '🔊 INITIALIZE AUDIO';
            
            // Close mobile menu on click
            if(window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
            }

            // Trigger animations
            setTimeout(() => {
                document.querySelectorAll('.fly-in').forEach(el => el.classList.add('active'));
            }, 50);
        }

        function toggleAudio() {
            if(!audioEl.src || audioEl.src.endsWith(window.location.pathname)) {
                alert("Audio track is offline for this module."); 
                return;
            }
            if(audioPlaying) {
                audioEl.pause(); 
                audioBtn.innerHTML = '🔊 INITIALIZE AUDIO';
            } else {
                audioEl.play().catch(e => console.log("Audio blocked by browser.")); 
                audioBtn.innerHTML = '⏸ PAUSE DICTATION';
            }
            audioPlaying = !audioPlaying;
        }

        audioEl.onended = () => { 
            audioPlaying = false; 
            audioBtn.innerHTML = '🔊 INITIALIZE AUDIO'; 
        };

        window.onload = () => {
            initNav();
            loadPart('m1-p1');
        };
    </script>
</body>
</html>
